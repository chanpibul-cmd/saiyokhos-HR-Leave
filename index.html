<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบวันลา</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <style>
        body { 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            font-family: 'Sarabun', sans-serif;
        }
        .hidden { display: none !important; }
        .container-main { max-width: 900px; margin: auto; padding: 20px; }
        
        .login-card {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: none;
            background: #ffffff;
        }
        .summary-card {
            border-radius: 15px;
            transition: transform 0.2s;
        }
        .summary-card:hover { transform: translateY(-3px); }
        .card-bg-leave { background: linear-gradient(135deg, #4e54c8, #8f94fb); color: white; }
        .card-bg-alert { background: linear-gradient(135deg, #ff9a9e, #fecfef); color: #333; }
    </style>
</head>
<body>
    <div class="container-main">
        <div id="login-section" class="card login-card mt-5">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-badge fs-1 text-primary"></i>
                    <h2 class="fw-bold mt-2 text-dark">ระบบตรวจสอบวันลา</h2>
                    <p class="text-muted">เข้าสู่ระบบเพื่อดูข้อมูลส่วนบุคคลของคุณ</p>
                </div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">เลขประจำตัวประชาชน</label>
                        <input type="text" id="username" class="form-control form-control-lg bg-light" required autocomplete="off" maxlength="13" placeholder="ระบุเลข 13 หลัก">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary">วันเดือนปีเกิด (เฉพาะตัวเลข)</label>
                        <input type="password" id="password" class="form-control form-control-lg bg-light" required autocomplete="off" placeholder="เช่น 07092523">
                    </div>

                    <div class="form-check mb-4 bg-light p-3 rounded border">
                        <input class="form-check-input ms-1" type="checkbox" id="pdpa" required>
                        <label class="form-check-label ms-2 text-muted" style="font-size: 0.85rem;" for="pdpa">
                            <strong> ข้าพเจ้ายินยอมให้ใช้ข้อมูลส่วนบุคคลข้างต้น เพื่อการตรวจสอบข้อมูลวันลาต่างๆ การขาดงาน มาสาย </strong>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-pill shadow-sm" id="loginBtn">เข้าสู่ระบบ</button>
                    
                    <div id="login-error" class="text-danger mt-3 text-center hidden fw-bold"></div>
                </form>
            </div>
        </div>

        <div id="app-section" class="hidden">
            <div class="card shadow-sm mb-4 border-0 rounded-4">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div>
                            <h4 class="mb-0 text-primary fw-bold" id="user-name"></h4>
                            <span class="badge bg-secondary mt-1 fs-6" id="user-position"></span>
                        </div>
                        <button class="btn btn-outline-danger rounded-pill px-4" onclick="logout()">
                            <i class="bi bi-box-arrow-right"></i> ออกระบบ
                        </button>
                    </div>
                    <hr>
                    <div class="row align-items-end g-2">
                        <div class="col-md-4">
                            <label class="form-label text-secondary fw-bold"><i class="bi bi-calendar3"></i> วันที่เริ่ม</label>
                            <input type="text" id="startDate" class="form-control bg-light" placeholder="เลือกวันที่">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-secondary fw-bold"><i class="bi bi-calendar3"></i> วันที่สิ้นสุด</label>
                            <input type="text" id="endDate" class="form-control bg-light" placeholder="เลือกวันที่">
                        </div>
                        <div class="col-md-4">
                            <button id="btn-filter" class="btn btn-dark w-100 fw-bold"><i class="bi bi-search"></i> กรองข้อมูล</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-3 mb-4" id="summary-section">
                </div>

            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="card-header bg-white border-bottom-0 pt-3 px-3 pb-0">
                    <ul class="nav nav-tabs border-bottom-0" id="leaveTabs" role="tablist">
                        </ul>
                </div>
                <div class="card-body bg-white p-0">
                    <div class="tab-content p-3" id="leaveTabsContent">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/th.js"></script>
    
    <script>
        // === นำ Web App URL มาใส่ที่นี่ ===
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw9dcIZpkrc3PvFxMC3B2aX7D2W6Ft_uUqvndGuQim4gyukwLCJSpclpLbFUTaVzCpu/exec';
        
        let currentUser = null;
        const sheets = ['ลาป่วย', 'ลากิจ', 'ลาคลอด', 'ลาพักผ่อน', 'สาย', 'ไม่สแกน', 'เวลาเข้างาน'];

        // ตั้งค่าตัวเลือกวันที่ (แก้ปัญหา Line Browser)
        flatpickr("#startDate", { locale: "th", dateFormat: "Y-m-d", defaultDate: "2025-10-01" });
        flatpickr("#endDate", { locale: "th", dateFormat: "Y-m-d" });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('login-error');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังตรวจสอบ...';
            errorDiv.classList.add('hidden');

            // เก็บค่า IP ผ่านบริการฟรี ipify
            let userIP = "Unknown";
            try {
                const ipReq = await fetch('https://api.ipify.org?format=json');
                const ipRes = await ipReq.json();
                userIP = ipRes.ip;
            } catch(e) {}

            const payload = {
                action: 'login',
                username: document.getElementById('username').value.replace(/\D/g, ''),
                password: document.getElementById('password').value.replace(/\D/g, ''),
                ip: userIP,
                userAgent: navigator.userAgent
            };

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const res = await response.json();
                
                if (res.status === 'success') {
                    currentUser = res.user;
                    document.getElementById('user-name').innerText = currentUser.name;
                    document.getElementById('user-position').innerText = "รหัสพนักงาน: " + currentUser.id + " | " + currentUser.position;
                    
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('app-section').classList.remove('hidden');
                    
                    initTabs();
                    fetchData();
                } else {
                    errorDiv.innerText = res.message;
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.innerText = 'เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์';
                errorDiv.classList.remove('hidden');
            }
            btn.disabled = false;
            btn.innerHTML = 'เข้าสู่ระบบ';
        });

        document.getElementById('btn-filter').addEventListener('click', fetchData);

        function renderSummary(data) {
            const summaryDiv = document.getElementById('summary-section');
            let html = '';
            
            // สรุปการลา 4 ประเภท (จำนวนครั้ง และ จำนวนวัน)
            const leaveTypes = ['ลาป่วย', 'ลากิจ', 'ลาคลอด', 'ลาพักผ่อน'];
            leaveTypes.forEach(type => {
                let records = data[type] || [];
                let count = records.length;
                let days = records.reduce((sum, r) => sum + (parseFloat(r.total) || 0), 0);
                
                html += `
                <div class="col-md-3 col-6">
                    <div class="card summary-card card-bg-leave border-0 h-100">
                        <div class="card-body p-3 text-center">
                            <h6 class="mb-2 fw-bold text-white-50">${type}</h6>
                            <h3 class="mb-0 fw-bold">${days} <small class="fs-6 fw-normal">วัน</small></h3>
                            <div class="mt-1 small bg-white text-dark rounded-pill d-inline-block px-2 py-1">${count} ครั้ง</div>
                        </div>
                    </div>
                </div>`;
            });

            // สรุปสายและไม่สแกน (นับแค่จำนวนครั้ง)
            const alertTypes = ['สาย', 'ไม่สแกน'];
            alertTypes.forEach(type => {
                let records = data[type] || [];
                let count = records.length;
                
                html += `
                <div class="col-md-6 col-6">
                    <div class="card summary-card card-bg-alert border-0 h-100">
                        <div class="card-body p-3 text-center">
                            <h6 class="mb-2 fw-bold opacity-75">${type}</h6>
                            <h2 class="mb-0 fw-bold text-danger">${count} <small class="fs-6 fw-normal text-dark">ครั้ง</small></h2>
                        </div>
                    </div>
                </div>`;
            });

            summaryDiv.innerHTML = html;
        }

        function initTabs() {
            const tabsContainer = document.getElementById('leaveTabs');
            const contentContainer = document.getElementById('leaveTabsContent');
            tabsContainer.innerHTML = '';
            contentContainer.innerHTML = '';

            sheets.forEach((sheet, index) => {
                const isActive = index === 0 ? 'active' : '';
                
                tabsContainer.innerHTML += `
                    <li class="nav-item" role="presentation">
                        <button class="nav-link ${isActive} fw-bold" data-bs-toggle="tab" data-bs-target="#tab-${index}" type="button" role="tab">${sheet}</button>
                    </li>
                `;
                
                let tableHeader = '';
                if(sheet === 'เวลาเข้างาน') {
                    tableHeader = `<tr><th>วันที่</th><th>เวลาเข้างาน</th></tr>`;
                } else {
                    tableHeader = `<tr><th>ลงวันที่</th><th>ลาวันที่</th><th>ถึงวันที่</th><th>รวม(วัน)</th><th>หมายเหตุ</th></tr>`;
                }

                contentContainer.innerHTML += `
                    <div class="tab-pane fade ${index === 0 ? 'show active' : ''}" id="tab-${index}" role="tabpanel">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light text-secondary">
                                    ${tableHeader}
                                </thead>
                                <tbody id="tbody-${index}">
                                    <tr><td colspan="5" class="text-center text-muted py-4">กำลังโหลดข้อมูล...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            });
        }

        async function fetchData() {
            if (!currentUser) return;
            const btn = document.getElementById('btn-filter');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> โหลด...';

            const payload = {
                action: 'getData',
                id: currentUser.id,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value
            };

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const res = await response.json();
                
                if (res.status === 'success') {
                    // แสดงสรุป Card ด้านบน
                    renderSummary(res.data);

                    // แสดงข้อมูลลงในตารางแต่ละ Tab
                    sheets.forEach((sheet, index) => {
                        const tbody = document.getElementById(`tbody-${index}`);
                        const records = res.data[sheet];
                        
                        if (!records || records.length === 0) {
                            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4"><i class="bi bi-inbox fs-3 d-block"></i> ไม่มีข้อมูล</td></tr>`;
                        } else {
                            if (sheet === 'เวลาเข้างาน') {
                                tbody.innerHTML = records.map(r => `
                                    <tr>
                                        <td class="fw-bold">${r.date}</td>
                                        <td><span class="badge bg-success bg-opacity-10 text-success p-2">${r.time.replace(/\n/g, '<br>')}</span></td>
                                    </tr>
                                `).join('');
                            } else {
                                tbody.innerHTML = records.map(r => `
                                    <tr>
                                        <td>${r.regDate}</td>
                                        <td class="fw-bold text-dark">${r.startDate}</td>
                                        <td class="fw-bold text-dark">${r.endDate}</td>
                                        <td><span class="badge bg-primary rounded-pill">${r.total}</span></td>
                                        <td class="text-muted small">${r.note || '-'}</td>
                                    </tr>
                                `).join('');
                            }
                        }
                    });
                }
            } catch (err) {
                console.error(err);
                alert("โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่");
            }
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-search"></i> กรองข้อมูล';
        }

        function logout() {
            currentUser = null;
            document.getElementById('loginForm').reset();
            document.getElementById('app-section').classList.add('hidden');
            document.getElementById('login-section').classList.remove('hidden');
            // เคลียร์ข้อมูลเก่าทิ้ง
            document.getElementById('summary-section').innerHTML = '';
        }
    </script>
</body>
</html>
